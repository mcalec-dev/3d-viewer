<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="js/state.js"></script>
    <script defer src="js/settings.js"></script>
    <script defer src="js/renderer.js"></script>
    <script defer src="js/sliders.js"></script>
    <script defer src="js/info.js"></script>
    <script defer src="js/chooser.js"></script>
  </head>
  <body class="select-none overflow-hidden bg-slate-600">
    <div id="info" class="fixed top-4 right-4 z-10 text-white w-32">
      <p>Debug Info</p>
      <div id="currentYaw">
        Yaw: <span id="yawValue">0</span>°
      </div>
      <div id="currentPitch">
        Pitch: <span id="pitchValue">0</span>°
      </div>
      <div id="currentFPS">
        FPS: <span id="fpsValue">0</span>
      </div>
    </div>
    <div id="chooser" class="fixed bottom-4 right-4 z-10 text-white">
      <div class="mb-2 flex items-center">
        <!-- future shape chooser -->
        <label for="shapeChooser" class="mr-2">Shape:</label>
        <select id="shapeChooser" class="rounded bg-slate-700 p-1 text-white">
          <option value="cube">Cube</option>
          <option value="pyramid">Pyramid</option>
          <option value="sphere">Sphere</option>
        </select>
      </div>
      <div class="flex items-center">
        <!-- future texture chooser -->
        <label for="textureSelect" class="mr-2">Texture:</label>
        <select id="textureSelect" class="rounded bg-slate-700 p-1 text-white">
          <option value="">Loading textures...</option>
        </select>
      </div>
    </div>
    <div id="sliders" class="fixed left-4 top-4 z-10 text-white">
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          X (width):
          <span id="widthValue">0</span>
          px
        </label>
        <input
          type="range"
          id="cubeWidth"
          class="w-18"
          min="10"
          max="1000"
          value="100"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Y (height):
          <span id="heightValue">0</span>
          px
        </label>
        <input
          type="range"
          id="cubeHeight"
          class="w-18"
          min="10"
          max="1000"
          value="100"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Z (depth):
          <span id="depthValue">0</span>
          px
        </label>
        <input
          type="range"
          id="cubeDepth"
          class="w-18"
          min="10"
          max="1000"
          value="100"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Camera Smoothness:
          <span id="smoothnessValue">0</span>
        </label>
        <input
          type="range"
          id="smoothness"
          class="w-18"
          min="0.01"
          max="1"
          step="0.01"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Camera Zoom:
          <span id="zoomValue">0</span>
        </label>
        <input
          type="range"
          id="zoom"
          class="w-18"
          min="1"
          max="10"
          step="0.10"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Scale:
          <span id="scaleValue">1</span>
        </label>
        <input
          type="range"
          id="scale"
          class="w-18"
          min="1"
          max="10"
          step="1"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Mouse Sensitivity:
          <span id="sensitivityValue">0</span>
        </label>
        <input
          type="range"
          id="sensitivity"
          class="w-18"
          min="1"
          max="200"
          step="1"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          FOV (Perspective):
          <span id="perspectiveValue">0</span>
        </label>
        <input
          type="range"
          id="perspective"
          class="w-18"
          min="500"
          max="3000"
          step="100"
        />
      </div>
      <div class="slider-container">
        <label class="flex items-center gap-2 text-sm font-medium" for="borderToggle">
          <input type="checkbox" id="borderToggle" class="h-4 w-4" />
          Show Face Borders
        </label>
      </div>
    </div>
    <div id="render" class="flex min-h-screen min-w-screen items-center justify-center">
      <div class="cube-container relative">
        <div class="cube cursor-grab active:cursor-grabbing">
          <div class="face front"></div>
          <div class="face back"></div>
          <div class="face top"></div>
          <div class="face left"></div>
          <div class="face right"></div>
          <div class="face bottom"></div>
        </div>
      </div>
    </div>
  </body>
</html>

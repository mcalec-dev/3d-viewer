<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="js/renderer.js"></script>
    <script defer src="js/sliders.js"></script>
    <script defer src="js/info.js"></script>
    <script defer src="js/chooser.js"></script>
  </head>
  <body class="select-none overflow-hidden bg-slate-600">
    <div id="info" class="fixed top-4 right-4 z-10 text-white w-32">
      <div id="currentYaw">
        Yaw: <span id="yawValue">0</span>°
      </div>
      <div id="currentPitch">
        Pitch: <span id="pitchValue">0</span>°
      </div>
      <div id="currentFPS">
        FPS: <span id="fpsValue">0</span>
      </div>
    </div>
    <div id="chooser" class="fixed bottom-4 right-4 z-10 text-white">
      <div class="mb-2 flex items-center">
        <!-- future shape chooser -->
        <label for="shapeChooser" class="mr-2">Shape:</label>
        <select id="shapeChooser" class="rounded bg-slate-700 p-1 text-white">
          <option value="cube">Cube</option>
          <option value="pyramid">Pyramid</option>
          <option value="sphere">Sphere</option>
        </select>
      </div>
      <div class="flex items-center">
        <!-- future texture chooser -->
        <label for="textureSelect" class="mr-2">Texture:</label>
        <select id="textureSelect" class="rounded bg-slate-700 p-1 text-white">
          <option value="solid">Solid Colors</option>
          <option value="grid">Grid</option>
          <option value="checkerboard">Checkerboard</option>
          <option value="wood">Wood</option>
          <option value="marble">Marble</option>
        </select>
      </div>
    </div>
    <div id="sliders" class="fixed left-4 top-4 z-10 text-white">
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          X (width):
          <span id="widthValue">100</span>
          px
        </label>
        <input
          type="range"
          id="cubeWidth"
          class="w-18"
          min="10"
          max="1000"
          value="100"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Y (height):
          <span id="heightValue">100</span>
          px
        </label>
        <input
          type="range"
          id="cubeHeight"
          class="w-18"
          min="10"
          max="1000"
          value="100"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Z (depth):
          <span id="depthValue">100</span>
          px
        </label>
        <input
          type="range"
          id="cubeDepth"
          class="w-18"
          min="10"
          max="1000"
          value="100"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Camera Smoothness:
          <span id="smoothnessValue">0.33</span>
        </label>
        <input
          type="range"
          id="smoothness"
          class="w-18"
          min="0.01"
          max="1"
          step="0.001"
          value="0.33"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Camera Zoom:
          <span id="zoomValue">1.00</span>
        </label>
        <input
          type="range"
          id="zoom"
          class="w-18"
          min="1"
          max="10"
          step="0.10"
          value="1"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Scale:
          <span id="scaleValue">1</span>
        </label>
        <input
          type="range"
          id="scale"
          class="w-18"
          min="1"
          max="10"
          step="1"
          value="1"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          Mouse Sensitivity:
          <span id="sensitivityValue">100%</span>
        </label>
        <input
          type="range"
          id="sensitivity"
          class="w-18"
          min="1"
          max="200"
          step="1"
          value="100"
        />
      </div>
      <div class="slider-container">
        <label class="mb-2 block text-sm font-medium">
          FOV (Perspective):
          <span id="perspectiveValue">1200px</span>
        </label>
        <input
          type="range"
          id="perspective"
          class="w-18"
          min="300"
          max="4800"
          step="100"
          value="1200"
        />
      </div>
    </div>
    <div id="render" class="flex min-h-screen min-w-screen items-center justify-center">
      <div class="cube-container relative">
        <div class="cube cursor-grab active:cursor-grabbing">
          <div class="face front bg-blue-500"></div>
          <div class="face back bg-yellow-500"></div>
          <div class="face top bg-blue-300"></div>
          <div class="face left bg-green-500"></div>
          <div class="face right bg-red-500"></div>
          <div class="face bottom bg-blue-700"></div>
        </div>
      </div>
    </div>
  </body>
</html>

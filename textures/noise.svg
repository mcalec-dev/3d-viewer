<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Noise texture">
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" seed="23" stitchTiles="stitch" result="noise" />
      <feColorMatrix in="noise" type="matrix" values="0.25 0 0 0 0
								0 0.25 0 0 0
								0 0 0.25 0 0
								0 0 0 1 0" result="dimNoise" />
      <feComponentTransfer in="dimNoise" result="leveledNoise">
        <feFuncR type="gamma" amplitude="1" exponent="1.2" offset="0" />
        <feFuncG type="gamma" amplitude="1" exponent="1.2" offset="0" />
        <feFuncB type="gamma" amplitude="1" exponent="1.2" offset="0" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#base)" />
  <rect width="512" height="512" filter="url(#grain)" opacity="0.85" />
</svg>
